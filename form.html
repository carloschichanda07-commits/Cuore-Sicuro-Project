<!DOCTYPE html>
<html lang="it">
<head>

    <style>
        /* ==========================================================================
           VARIABILI CSS - IL PANNELLO DI CONTROLLO DEI COLORI
           ========================================================================== */
        :root {
            /* Colori Primari (Brand) */
            --primary-color: #165175;
            --primary-dark: #0f3d59;
            --primary-light: #eef5fb; /* Azzurro chiarissimo per sfondi */
            
            /* Colori di Azione */
            --accent-green: #00b67a;
            --accent-green-hover: #009665;
            --danger-red: #d9534f;
            --danger-red-hover: #c9302c;
            
            /* Sfondi e Testi */
            --bg-white: #ffffff;
            --bg-body: #f8fbff; /* Uno sfondo appena percettibile per far risaltare le card bianche */
            --text-dark: #333333;
            --text-medium: #555555;
            --border-light: #e6eff5;
            
            /* Forme e Ombre (Design System) */
            --radius-md: 8px;
            --radius-lg: 16px;
            --shadow-sm: 0 4px 15px rgba(22, 81, 117, 0.05); /* Ombra con punta di blu */
            --shadow-hover: 0 8px 25px rgba(22, 81, 117, 0.12);
            --transition-speed: 0.3s;
        }

        /* --- STILI GENERALI (Per garantire pulizia se mancano in style.css) --- */
        body {
            background-color: var(--bg-body);
            color: var(--text-medium);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        h1, h2, h3 { color: var(--primary-color); }

        /* --- STILI HEADER RESPONSIVE --- */
        header { 
            background: var(--bg-white); 
            padding: 15px 0; 
            box-shadow: var(--shadow-sm); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        
        .header-content { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .LOGO {
            text-decoration: none; 
            color: var(--primary-color); 
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 0.5px;
        }

        .main-nav ul { 
            display: flex; 
            list-style: none; 
            gap: 25px; 
            margin: 0; 
            padding: 0; 
            align-items: center;
        }

        .voci { 
            text-decoration: none; 
            color: var(--primary-color); 
            font-weight: 600; 
            font-size: 0.95rem;
            transition: color var(--transition-speed);
        }

        .voci:hover { color: var(--accent-green); }

        /* Pulsanti Auth (Login e Logout standardizzati) */
        .btn-login, .btn-logout {
            padding: 10px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all var(--transition-speed);
            border: 2px solid transparent;
        }

        .btn-login {
            background-color: var(--primary-color);
            color: var(--bg-white);
        }
        .btn-login:hover { background-color: var(--primary-dark); color: var(--bg-white); }

        .btn-logout {
            background-color: var(--danger-red);
            color: var(--bg-white);
        }
        .btn-logout:hover { background-color: var(--danger-red-hover); color: var(--bg-white); }

        .menu-toggle { 
            display: none; background: none; border: none; cursor: pointer; padding: 5px;
        }
        .menu-toggle span { 
            display: block; width: 25px; height: 3px; background: var(--primary-color); margin: 5px 0; transition: var(--transition-speed); 
        }
        .mobile-auth { display: none; }

        /* Media Query per Mobile */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .desktop-auth { display: none; }
            .mobile-auth { display: block; margin-top: 20px; width: 100%; text-align: center; }
            .mobile-auth .btn-login, .mobile-auth .btn-logout { display: block; width: 80%; margin: 0 auto; }
            
            .main-nav { 
                position: absolute; top: 100%; left: -100%; width: 100%; height: 100vh; 
                background: var(--bg-white); transition: 0.4s ease-in-out; 
                display: flex; flex-direction: column; padding: 30px 20px;
                box-shadow: var(--shadow-sm);
            }
            .main-nav.active { left: 0; }
            .main-nav ul { flex-direction: column; align-items: center; width: 100%; }
            .main-nav ul li { margin-bottom: 20px; font-size: 1.2rem; }
        }
        
        
        /* Centriamo e limitiamo la larghezza per renderlo una "Card" elegante */
        .form-section {
            display: flex;
            justify-content: center;
            padding: 0 20px 60px 20px;
        }

        .form-container-box {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            padding: 40px;
            border-top: 5px solid #165175; /* Il blu scuro dell'header */
            width: 100%;
            max-width: 850px;
            box-sizing: border-box;
        }

        /* Titolo della pagina */
        h1 {
            color: #165175;
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 900;
        }

        /* Garantiamo che le righe si affianchino correttamente */
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .align-center {
            align-items: center;
        }

        .half-width {
            flex: 1 1 calc(50% - 10px);
            min-width: 250px;
        }

        .third-width {
            flex: 1 1 calc(50% - 10px);
            min-width: 200px;
        }

        .form-group {
            margin-bottom: 20px;
            width: 100%;
        }

        /* Stile delle etichette (Label) */
        .form-group label {
            display: block;
            font-weight: 700;
            color: #2c3e50;
            font-size: 0.9rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Stile moderno per gli input, select e textarea */
        .input-wire, .select-wire, .textarea-wire {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid #dce8f5;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            background-color: #f9fbff;
            color: #333;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* Effetto luminoso quando l'utente clicca nel campo */
        .input-wire:focus, .select-wire:focus, .textarea-wire:focus {
            outline: none;
            border-color: #165175;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(22, 81, 117, 0.1);
        }

        .textarea-wire {
            resize: vertical;
            min-height: 150px;
        }

        /* --- FIX RADIO BUTTONS --- */
        .radio-group-inline {
            display: flex;
            gap: 20px;
            align-items: center;
            padding-top: 5px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
            color: #444;
            font-size: 0.95rem;
            text-transform: none;
            position: relative;
        }

        /* Nascondiamo il pallino nativo del browser */
        .radio-label input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        /* Creiamo il nostro cerchio personalizzato vuoto */
        .custom-radio {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #165175;
            border-radius: 50%;
            margin-right: 10px;
            background-color: #fff;
            position: relative;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        /* Creiamo il puntino interno che appare SOLO quando è selezionato */
        .radio-label input[type="radio"]:checked ~ .custom-radio::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Centra perfettamente il puntino */
            width: 10px;
            height: 10px;
            background-color: #165175;
            border-radius: 50%;
        }

        /* Effetto quando passi sopra col mouse */
        .radio-label:hover .custom-radio {
            background-color: #f0f7ff;
        }

        /* Bottone di Invio */
        .btn-outline {
            background-color: #165175;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(22, 81, 117, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-top: 10px;
        }

        .btn-outline:hover {
            background-color: #113d58;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(22, 81, 117, 0.3);
        }
        
        /* --- STILI FINALI FOOTER (Forzati per contrasto sicuro) --- */
        footer {
            background-color: var(--primary-color) !important; /* Forza lo sfondo blu istituzionale */
            color: var(--bg-white) !important;
            padding: 40px 0 !important;
            margin-top: 60px;
        }

        .footer-content {
            text-align: center;
        }

        footer .logo {
            color: var(--bg-white) !important;
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .footer-links {
            margin-bottom: 15px;
            color: rgba(255, 255, 255, 0.4) !important; /* Colore dei separatori "|" */
        }

        .footer-links a {
            color: var(--bg-white) !important;
            text-decoration: none !important;
            margin: 0 12px;
            font-weight: 600;
            transition: color var(--transition-speed);
        }

        .footer-links a:hover {
            color: var(--accent-green) !important; /* Un bel tocco di verde quando passi il mouse */
        }

        footer .copyright {
            color: rgba(255, 255, 255, 0.7) !important;
            font-size: 0.9rem;
            margin: 0;
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo">
                <a href="index.html" class="LOGO">
                    <img src="logo_CS_scritta.png" alt="Logo Cuore Sicuro" style="max-height: 60px; width: auto; display: block;">
                </a>
            </div>
            
            <button class="menu-toggle" aria-label="Apri menu">
                <span></span><span></span><span></span>
            </button>

            <nav class="main-nav">
                <ul>
                    <li><a href="chi-siamo.html" class="voci">CHI SIAMO</a></li>
                    <li><a href="form.html" class="voci">CONTATTACI</a></li>
                    <li><a href="notizie.html" class="voci">NOTIZIE</a></li>
                    <li><a href="dashboard.html" class="voci">ADMIN (DEMO)</a></li>
                    <li class="mobile-auth">
                        <a href="area-utente.html" class="btn-login">AREA UTENTE</a>
                    </li>
                </ul>
            </nav>

            <div class="auth-box desktop-auth">
                <a href="area-utente.html" class="btn-login">AREA UTENTE (DEMO)</a>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="section-padding text-center">
            <h1>COMPILA IL NOSTRO FORM</h1>
        </section>

        <section class="form-section">
            <div class="form-container-box">
                <form action="successo.html" method="get" class="detailed-form">
                    <div class="form-row">
                        <div class="form-group half-width">
                            <label>Nome:</label>
                            <input type="text" name="nome" class="input-wire" id="nome" required>
                        </div>
                        <div class="form-group half-width">
                            <label>Cognome:</label>
                            <input type="text" name="cognome" class="input-wire" id="cognome" required>
                        </div>
                    </div>

                    <div class="form-row align-center">
                        <div class="form-group third-width">
                            <label>Sesso:</label>
                            <div class="radio-group-inline">
                                <label class="radio-label">
                                    <input type="radio" name="sesso" value="maschio" required>
                                    <span class="custom-radio"></span> MASCHIO
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="sesso" value="femmina" required>
                                    <span class="custom-radio"></span> FEMMINA
                                </label>
                            </div>
                        </div>
                        <div class="form-group third-width">
                            <label>Età:</label>
                            <input type="date" name="data_nascita" class="input-wire input-date-sim" required>
                        </div>
                        <div class="form-group third-width">
                            <label for="classe">Classe:</label>
                            <select id="classe" name="classe" class="select-wire" required>
                                <option value="" disabled selected>Seleziona classe...</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group half-width">
                            <label for="email">E-mail:</label>
                            <input type="email" id="email" name="email" class="input-wire" placeholder="esempio@mail.it" required>
                        </div>
                        <div class="form-group half-width">
                            <label for="telefono">Telefono:</label>
                            <input type="tel" id="telefono" name="telefono" class="input-wire" placeholder="+39 ..." required>
                        </div>
                    </div>

                    <div class="form-group option-field">
                        <label for="scopo">Scopo Della Visita?</label>
                        <select id="scopo" name="scopo" class="select-wire" required>
                            <option value="" disabled selected>Seleziona un'opzione...</option>
                            <option value="aiuto">HO BISOGNO DI AIUTO (RIMANE TRA DI NOI)</option>
                            <option value="storia">VOGLIO CONDIVIDERE LA MIA STORIA (VERRÀ PUBBLICATA)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>SCRIVI IL TUO TESTO:</label>
                        <textarea name="messaggio" class="textarea-wire" placeholder="Scrivi qui il tuo testo..." id="messaggio" required></textarea>
                    </div>

                    <div class="form-group" id="anonimo-group">
                        <label>VOGLIO RIMANERE ANONIMO:</label>
                        <div class="radio-group-inline">
                            <label class="radio-label">
                                <input type="radio" name="anonimo" value="si">
                                <span class="custom-radio"></span> SI
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="anonimo" value="no">
                                <span class="custom-radio"></span> NO
                            </label>
                        </div>
                    </div>

                    <div class="text-center mt-40">
                        <button type="submit" class="btn-outline">Invia il form (Demo)</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
    <footer>
        <div class="logo" style="margin-bottom: 15px; display: flex; justify-content: center; align-items: center;">
            <img src="logo_CS_scritta.png" alt="Logo Cuore Sicuro" style="max-height: 75px; width: auto;">
        </div>
        <div class="container footer-content" style="padding-top: 40px; border-top: 1px solid rgba(255, 255, 255, 0.2); margin-top: 40px; text-align: center;">
            <div class="logo" style="color: var(--bg-white); font-weight: 800; font-size: 1.2rem; margin-bottom: 15px; letter-spacing: 1px;">
                CUORE SICURO
            </div>
            <div class="footer-links" style="margin-bottom: 15px; color: rgba(255, 255, 255, 0.5);">
                <a href="form.html" style="color: var(--bg-white); text-decoration: none; margin: 0 10px;">CONTATTACI</a> | 
                <a href="chi-siamo.html" style="color: var(--bg-white); text-decoration: none; margin: 0 10px;">CHI SIAMO</a> | 
                <a href="notizie.html" style="color: var(--bg-white); text-decoration: none; margin: 0 10px;">NOTIZIE</a> |
                <a href="dashboard.html" style="color: var(--bg-white); text-decoration: none; margin: 0 10px;">ADMIN</a>
            </div>
            <p class="copyright" style="color: rgba(255, 255, 255, 0.7); font-size: 0.9rem;">
                © COPYRIGHT 2026 - Cuore Sicuro (Portfolio Showcase)
            </p>
        </div>
    </footer>

    <script>
        const menuToggle = document.querySelector('.menu-toggle');
        const nav = document.querySelector('.main-nav');
        if (menuToggle && nav) {
            menuToggle.addEventListener('click', () => { nav.classList.toggle('active'); });
        }
    </script>
</body>
</html>
